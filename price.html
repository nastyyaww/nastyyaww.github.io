    <script>
        // Поддерживает: атрибут tag, текстовое содержимое, атрибут code
function processImageTags(xmlDoc, imageMap) {
    // Вариант 1: По атрибуту tag
    const byTagAttr = xmlDoc.querySelectorAll("image[tag]");
    byTagAttr.forEach(el => replaceWithImage(el, el.getAttribute("tag"), imageMap));
    
    // Вариант 2: По текстовому содержимому (<image>cat_001</image>)
    const byText = Array.from(xmlDoc.querySelectorAll("image")).filter(el => 
        el.textContent.trim() && !el.hasAttribute("tag")
    );
    byText.forEach(el => replaceWithImage(el, el.textContent.trim(), imageMap));
    
    // Вариант 3: По атрибуту code
    const byCode = xmlDoc.querySelectorAll("image[code]");
    byCode.forEach(el => replaceWithImage(el, el.getAttribute("code"), imageMap));
}

function replaceWithImage(element, tag, imageMap) {
    if (imageMap[tag]) {
        const img = document.createElement("img");
        img.src = imageMap[tag];
        img.alt = tag;
        img.className = "xml-image";
        
        // Сохраняем оригинальные атрибуты
        if (element.hasAttribute("width")) {
            img.width = element.getAttribute("width");
        }
        
        element.parentNode.replaceChild(img, element);
    } else {
        console.warn(`Изображение для метки "${tag}" не найдено`);
    }
}
